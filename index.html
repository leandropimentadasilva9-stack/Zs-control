<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zs Control</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f0f;
  color:white;
}

/* LOGIN */
#login {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.logo {
  font-size:40px;
  color:#ff2d55;
}

input {
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  width:80%;
}

button {
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff2d55;
  color:white;
  width:80%;
  font-weight:bold;
}

/* APP */
#app {
  display:none;
  padding:15px;
}

.card {
  background:#1a1a1a;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.item-btn {
  background:#2a2a2a;
  padding:12px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.prod {
  background:#2a2a2a;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  border-left:5px solid #ff2d55;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="logo">❤️ Zona Sul</div>
  <h2>Zs Control</h2>

  <input id="nomeUser" placeholder="Nome">
  <input id="matricula" placeholder="Matrícula">

  <button onclick="entrar()">Entrar</button>
</div>

<!-- APP -->
<div id="app">

<h3 id="userInfo"></h3>

<div class="card">
<h3>Selecionar Categoria</h3>

<div class="grid">
<div class="item-btn" onclick="setCategoria('Açougue')">Açougue</div>
<div class="item-btn" onclick="setCategoria('Laticínios')">Laticínios</div>
<div class="item-btn" onclick="setCategoria('Bebidas')">Bebidas</div>
<div class="item-btn" onclick="setCategoria('Padaria')">Padaria</div>
</div>

</div>

<div class="card">
<h3>Produtos de Alto Risco</h3>

<div class="grid">
<div class="item-btn" onclick="setProduto('Azeite')">Azeite</div>
<div class="item-btn" onclick="setProduto('Carnes')">Carnes</div>
<div class="item-btn" onclick="setProduto('Uísque')">Uísque</div>
<div class="item-btn" onclick="setProduto('Bebidas')">Bebidas</div>
</div>

</div>

<div class="card">
<h3>Data de Validade</h3>
<input type="date" id="data">
<button onclick="cadastrar()">Cadastrar</button>
</div>

<div class="card">
<h3>Produtos Cadastrados</h3>
<div id="lista"></div>
<button onclick="exportar()">Exportar Excel</button>
</div>

</div>

<script>

let usuario = "";
let categoria = "";
let produtoSelecionado = "";
let produtos = [];

function entrar(){
  let nome = document.getElementById("nomeUser").value;
  let mat = document.getElementById("matricula").value;

  if(!nome || !mat){
    alert("Preencha os dados");
    return;
  }

  usuario = nome + " ("+mat+")";

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("userInfo").innerText = usuario;
}

function setCategoria(c){
  categoria = c;
  alert("Categoria: "+c);
}

function setProduto(p){
  produtoSelecionado = p;
  alert("Produto: "+p);
}

function cadastrar(){

  let data = document.getElementById("data").value;

  if(!produtoSelecionado || !categoria || !data){
    alert("Selecione tudo");
    return;
  }

  produtos.push({
    usuario,
    categoria,
    produto: produtoSelecionado,
    data
  });

  render();
}

function render(){
  let lista = document.getElementById("lista");
  lista.innerHTML="";

  produtos.forEach(p=>{
    let div = document.createElement("div");
    div.className="prod";
    div.innerHTML = `
      <b>${p.produto}</b><br>
      ${p.categoria}<br>
      ${p.data}
    `;
    lista.appendChild(div);
  });
}

/* EXPORTAR CSV (ABRE NO EXCEL) */
function exportar(){

  let csv = "Usuario,Categoria,Produto,Data\n";

  produtos.forEach(p=>{
    csv += `${p.usuario},${p.categoria},${p.produto},${p.data}\n`;
  });

  let blob = new Blob([csv], { type: 'text/csv' });
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "produtos.csv";
  a.click();
}

</script>

</body>
</html>
