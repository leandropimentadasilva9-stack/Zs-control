<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "COLE_AQUI",
  authDomain: "COLE_AQUI",
  projectId: "COLE_AQUI",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let produtos = [];

function dias(d){
 let hoje=new Date(); hoje.setHours(0,0,0,0);
 let dt=new Date(d); dt.setHours(0,0,0,0);
 return Math.ceil((dt-hoje)/(1000*60*60*24));
}

async function carregar(){
  produtos = [];
  const querySnapshot = await getDocs(collection(db, "produtos"));
  
  querySnapshot.forEach((docItem) => {
    produtos.push({ id: docItem.id, ...docItem.data() });
  });

  render();
}

async function add(){
 let nome = nomeEl.value;
 let cat = categoriaEl.value;
 let data = dataEl.value;

 if(!nome || !data) return alert("Preencha");

 await addDoc(collection(db, "produtos"), {
   nome, cat, data
 });

 nomeEl.value="";
 categoriaEl.value="";
 dataEl.value="";

 carregar();
}

async function removeItem(id){
 await deleteDoc(doc(db, "produtos", id));
 carregar();
}

function render(){

 let lista=document.getElementById("lista");
 lista.innerHTML="";

 produtos.sort((a,b)=> new Date(a.data)-new Date(b.data));

 produtos.forEach((x)=>{

  let d=dias(x.data);
  let cls="ok", txt="OK";

  if(d<0){cls="vencido";txt="VENCIDO";}
  else if(d<=3){cls="perto";txt="Vence em "+d+"d";}

  let div=document.createElement("div");
  div.className="prod "+cls;

  div.innerHTML=`
  <div>
  <b>${x.nome}</b><br>
  <small>${x.cat||""}</small><br>
  <small>${new Date(x.data).toLocaleDateString()}</small>
  </div>

  <div>
  <div class="status">${txt}</div>
  <button onclick="removeItem('${x.id}')">Remover</button>
  </div>
  `;

  lista.appendChild(div);
 });

}

const nomeEl=document.getElementById("nome");
const categoriaEl=document.getElementById("categoria");
const dataEl=document.getElementById("data");

window.add = add;

carregar();

</script>
