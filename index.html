<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zs Control</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(120deg, #ffffff, #f3f3f3);
  animation: bg 8s infinite alternate;
}

@keyframes bg {
  0% { background:#ffffff; }
  100% { background:#f0f0f0; }
}

/* telas */
.tela { display:none; padding:20px; }
.ativa { display:block; }

h2 { margin-bottom:15px; }

/* inputs */
input {
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* botão */
button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#d90429;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* grid */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.item {
  background:white;
  padding:18px;
  border-radius:14px;
  text-align:center;
  border:2px solid #ddd;
  cursor:pointer;
  transition:0.2s;
}

.item:hover {
  background:#ffe5ea;
}

.selecionado {
  background:#d90429 !important;
  color:white;
}

/* produtos */
.prod {
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
}

.vencido {
  border-left:6px solid red;
  animation:pulse 1s infinite;
}

.perto { border-left:6px solid orange; }
.ok { border-left:6px solid green; }

@keyframes pulse {
  0%{transform:scale(1);}
  50%{transform:scale(1.02);}
  100%{transform:scale(1);}
}

.alerta {
  color:red;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="tela ativa" id="login">
<h2>❤️ Zona Sul</h2>
<input id="nome" placeholder="Nome">
<input id="mat" placeholder="Matrícula">
<button onclick="entrar()">Entrar</button>
</div>

<!-- CATEGORIA -->
<div class="tela" id="categoria">
<h2>Selecionar Categoria</h2>
<div class="grid" id="catGrid">
<div class="item" onclick="selectItem(this,'Açougue')">Açougue</div>
<div class="item" onclick="selectItem(this,'Laticínios')">Laticínios</div>
<div class="item" onclick="selectItem(this,'Bebidas')">Bebidas</div>
<div class="item" onclick="selectItem(this,'Padaria')">Padaria</div>
</div>
<button onclick="proximaTela('produtos')">Continuar</button>
</div>

<!-- PRODUTOS -->
<div class="tela" id="produtos">
<h2>Produtos de Alto Risco</h2>
<div class="grid" id="prodGrid">
<div class="item" onclick="selectItem(this,'Azeite')">Azeite</div>
<div class="item" onclick="selectItem(this,'Carnes')">Carnes</div>
<div class="item" onclick="selectItem(this,'Bebidas')">Bebidas</div>
<div class="item" onclick="selectItem(this,'Whisky')">Whisky</div>
</div>
<button onclick="proximaTela('nomeProduto')">Continuar</button>
</div>

<!-- NOME PRODUTO -->
<div class="tela" id="nomeProduto">
<h2>Nome do Produto</h2>
<input id="nomeProd" placeholder="Digite o nome do produto">
<button onclick="proximaTela('dataTela')">Continuar</button>
</div>

<!-- DATA -->
<div class="tela" id="dataTela">
<h2>Data de Validade</h2>
<input type="date" id="data">
<button onclick="cadastrar()">Cadastrar</button>
</div>

<!-- HOME -->
<div class="tela" id="home">
<h2>Produtos</h2>
<div id="alerta" class="alerta"></div>
<div id="lista"></div>
<button onclick="novaEntrada()">Novo Cadastro</button>
</div>

<script>

let user="", categoria="", produto="", nomeProduto="";
let banco = JSON.parse(localStorage.getItem("zs")||"[]");

function tela(id){
 document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
 document.getElementById(id).classList.add("ativa");
}

function entrar(){
 user = nome.value+" ("+mat.value+")";
 if(!nome.value||!mat.value) return alert("Preencha");
 tela("categoria");
}

function selectItem(el, valor){
 let parent = el.parentElement;
 parent.querySelectorAll(".item").forEach(i=>i.classList.remove("selecionado"));
 el.classList.add("selecionado");

 if(parent.id==="catGrid") categoria = valor;
 if(parent.id==="prodGrid") produto = valor;
}

function proximaTela(id){
 if(id==="produtos" && !categoria) return alert("Escolha categoria");
 if(id==="nomeProduto" && !produto) return alert("Escolha produto");

 if(id==="dataTela"){
   nomeProduto = document.getElementById("nomeProd").value;
   if(!nomeProduto) return alert("Digite o nome");
 }

 tela(id);
}

function dias(d){
 let hoje=new Date(); hoje.setHours(0,0,0,0);
 let dt=new Date(d); dt.setHours(0,0,0,0);
 return Math.ceil((dt-hoje)/(1000*60*60*24));
}

function cadastrar(){

 let data = document.getElementById("data").value;
 if(!data) return alert("Selecione a data");

 banco.push({
  user, categoria, produto, nomeProduto, data, status:"ativo"
 });

 localStorage.setItem("zs", JSON.stringify(banco));

 render();
 tela("home");
}

function render(){

 let div=document.getElementById("lista");
 div.innerHTML="";

 let urgentes=0;

 banco.filter(p=>p.status==="ativo").forEach((p,i)=>{

  let d=dias(p.data);
  let cls="ok";

  if(d<0){cls="vencido"; urgentes++;}
  else if(d<=3){cls="perto";}

  let el=document.createElement("div");
  el.className="prod "+cls;

  el.onclick=()=>acoes(i);

  el.innerHTML=`
  <b>${p.nomeProduto}</b><br>
  ${p.produto} | ${p.categoria}<br>
  ${p.data}<br>
  ${p.user}
  `;

  div.appendChild(el);
 });

 alerta.innerText = urgentes>0 ? "⚠️ "+urgentes+" produtos vencidos!" : "";
}

function acoes(i){

 let op = prompt("1-Tratar\n2-Lembrar\n3-Excluir");

 if(op==1) banco[i].status="tratado";
 if(op==3) banco[i].status="excluido";

 localStorage.setItem("zs", JSON.stringify(banco));
 render();
}

function novaEntrada(){
 tela("categoria");
}

</script>

</body>
</html>
