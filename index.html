<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zs Control</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f2f2f2;
}

/* telas */
.tela { display:none; padding:20px; }
.ativa { display:block; }

h2 { margin-bottom:15px; }

/* inputs */
input {
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* botão */
button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#d90429;
  color:white;
  font-weight:bold;
}

/* grid */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.item {
  background:white;
  padding:18px;
  border-radius:14px;
  text-align:center;
  border:2px solid #ddd;
  cursor:pointer;
  transition:0.2s;
}

.item:active {
  transform:scale(0.97);
  background:#ffe5ea;
}

/* lista */
.prod {
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

.vencido { border-left:6px solid red; }
.perto { border-left:6px solid orange; }
.ok { border-left:6px solid green; }

</style>
</head>

<body>

<!-- LOGIN -->
<div class="tela ativa" id="login">
  <h2>❤️ Zona Sul</h2>
  <input id="nome" placeholder="Nome">
  <input id="matricula" placeholder="Matrícula">
  <button onclick="irCategoria()">Entrar</button>
</div>

<!-- CATEGORIA -->
<div class="tela" id="categoria">
  <h2>Selecionar Categoria</h2>
  <div class="grid">
    <div class="item" onclick="clicarCategoria('Açougue')">Açougue</div>
    <div class="item" onclick="clicarCategoria('Laticínios')">Laticínios</div>
    <div class="item" onclick="clicarCategoria('Bebidas')">Bebidas</div>
    <div class="item" onclick="clicarCategoria('Padaria')">Padaria</div>
  </div>
</div>

<!-- PRODUTOS -->
<div class="tela" id="produtos">
  <h2>Produtos de Alto Risco</h2>
  <div class="grid">
    <div class="item" onclick="clicarProduto('Azeite')">Azeite</div>
    <div class="item" onclick="clicarProduto('Carnes')">Carnes</div>
    <div class="item" onclick="clicarProduto('Bebidas')">Bebidas</div>
    <div class="item" onclick="clicarProduto('Whisky')">Whisky</div>
  </div>
</div>

<!-- DATA -->
<div class="tela" id="dataTela">
  <h2>Data de Validade</h2>
  <input type="date" id="data">
  <button onclick="cadastrar()">Cadastrar</button>
</div>

<!-- LISTA -->
<div class="tela" id="listaTela">
  <h2>Produtos Cadastrados</h2>
  <div id="lista"></div>
  <button onclick="novo()">Novo Cadastro</button>
</div>

<script>

let nomeUser="", matriculaUser="", categoria="", produto="";
let banco = JSON.parse(localStorage.getItem("produtos")||"[]");

function tela(id){
  document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
  document.getElementById(id).classList.add("ativa");
}

function irCategoria(){
  nomeUser = document.getElementById("nome").value;
  matriculaUser = document.getElementById("matricula").value;

  if(!nomeUser || !matriculaUser){
    alert("Preencha os dados");
    return;
  }

  tela("categoria");
}

function clicarCategoria(c){
  categoria = c;
  setTimeout(()=> tela("produtos"),100);
}

function clicarProduto(p){
  produto = p;
  setTimeout(()=> tela("dataTela"),100);
}

function dias(d){
  let hoje=new Date(); hoje.setHours(0,0,0,0);
  let dt=new Date(d); dt.setHours(0,0,0,0);
  return Math.ceil((dt-hoje)/(1000*60*60*24));
}

function cadastrar(){

  let data = document.getElementById("data").value;

  if(!data){
    alert("Escolha a data");
    return;
  }

  banco.push({
    nome:nomeUser,
    matricula:matriculaUser,
    categoria,
    produto,
    data
  });

  localStorage.setItem("produtos", JSON.stringify(banco));

  mostrar();
  tela("listaTela");
}

function mostrar(){

  let div = document.getElementById("lista");
  div.innerHTML="";

  banco.sort((a,b)=> new Date(a.data)-new Date(b.data));

  banco.forEach(p=>{
    let d=dias(p.data);
    let cls="ok";

    if(d<0) cls="vencido";
    else if(d<=3) cls="perto";

    let el=document.createElement("div");
    el.className="prod "+cls;

    el.innerHTML=`
    <b>${p.produto}</b><br>
    ${p.categoria}<br>
    ${p.data}<br>
    ${p.nome} (${p.matricula})
    `;

    div.appendChild(el);
  });
}

function novo(){
  tela("categoria");
}

</script>

</body>
</html>
