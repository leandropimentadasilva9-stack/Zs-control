<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zs Control</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f4f4f4;
}

/* telas */
.tela { display:none; padding:20px; }
.ativa { display:block; }

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#d90429;
  color:white;
  margin-top:10px;
}

/* produtos */
.prod {
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
}

/* status */
.vencido {
  border-left:6px solid red;
  animation:pulse 1s infinite;
}

.perto { border-left:6px solid orange; }
.ok { border-left:6px solid green; }

@keyframes pulse {
  0%{transform:scale(1); background:#fff;}
  50%{transform:scale(1.02); background:#ffe5e5;}
  100%{transform:scale(1);}
}

/* menu */
.menu {
  display:flex;
  gap:10px;
}

.menu button {
  flex:1;
  background:#999;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="tela ativa" id="login">
<h2>❤️ Zona Sul</h2>
<input id="nome" placeholder="Nome"><br>
<input id="mat" placeholder="Matrícula"><br>
<button onclick="entrar()">Entrar</button>
</div>

<!-- HOME -->
<div class="tela" id="home">
<h3 id="alerta"></h3>

<div class="menu">
<button onclick="verTratados()">Tratados</button>
<button onclick="verExcluidos()">Excluídos</button>
</div>

<h2>Produtos Pendentes</h2>
<div id="lista"></div>

<button onclick="novo()">Novo Cadastro</button>
</div>

<!-- CADASTRO -->
<div class="tela" id="cadastro">
<h2>Cadastro</h2>

<button onclick="setProduto('Azeite')">Azeite</button>
<button onclick="setProduto('Carnes')">Carnes</button>
<button onclick="setProduto('Bebidas')">Bebidas</button>
<button onclick="setProduto('Whisky')">Whisky</button>

<input type="date" id="data">
<button onclick="salvar()">Cadastrar</button>
</div>

<!-- TRATADOS -->
<div class="tela" id="tratados">
<h2>Tratados</h2>
<div id="listaTratados"></div>
<button onclick="voltar()">Voltar</button>
</div>

<!-- EXCLUIDOS -->
<div class="tela" id="excluidos">
<h2>Excluídos</h2>
<div id="listaExcluidos"></div>
<button onclick="voltar()">Voltar</button>
</div>

<script>

let user="";
let produtoSel="";
let banco = JSON.parse(localStorage.getItem("zs")||"[]");

function tela(id){
 document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
 document.getElementById(id).classList.add("ativa");
}

function entrar(){
 user = nome.value + " ("+mat.value+")";
 if(!nome.value||!mat.value)return alert("Preencha");
 atualizar();
 tela("home");
}

function dias(d){
 let hoje=new Date(); hoje.setHours(0,0,0,0);
 let dt=new Date(d); dt.setHours(0,0,0,0);
 return Math.ceil((dt-hoje)/(1000*60*60*24));
}

function atualizar(){

 let lista=document.getElementById("lista");
 lista.innerHTML="";

 let urgentes=0;

 banco.filter(p=>p.status==="ativo").forEach((p,i)=>{

  let d=dias(p.data);
  let cls="ok";

  if(d<0){cls="vencido"; urgentes++;}
  else if(d<=3){cls="perto";}

  let div=document.createElement("div");
  div.className="prod "+cls;

  div.onclick=()=>acoes(i);

  div.innerHTML=`
  <b>${p.produto}</b><br>
  ${p.data}<br>
  ${p.user}
  `;

  lista.appendChild(div);
 });

 alerta.innerText = urgentes>0 ? "⚠️ "+urgentes+" produtos URGENTES!" : "";
}

function acoes(i){

 let escolha = prompt("1-Tratar\n2-Lembrar\n3-Arquivar\n4-Excluir");

 if(escolha==1) banco[i].status="tratado";
 if(escolha==2) return;
 if(escolha==3) banco[i].status="arquivado";
 if(escolha==4) banco[i].status="excluido";

 salvarBanco();
 atualizar();
}

function novo(){ tela("cadastro"); }

function setProduto(p){ produtoSel=p; }

function salvar(){

 let data=document.getElementById("data").value;
 if(!produtoSel||!data)return alert("Preencha");

 banco.push({
  produto:produtoSel,
  data,
  user,
  status:"ativo"
 });

 salvarBanco();
 atualizar();
 tela("home");
}

function salvarBanco(){
 localStorage.setItem("zs",JSON.stringify(banco));
}

function verTratados(){
 let div=document.getElementById("listaTratados");
 div.innerHTML="";
 banco.filter(p=>p.status==="tratado").forEach(p=>{
  div.innerHTML+=`<div class="prod">${p.produto} - ${p.data}</div>`;
 });
 tela("tratados");
}

function verExcluidos(){
 let div=document.getElementById("listaExcluidos");
 div.innerHTML="";
 banco.filter(p=>p.status==="excluido").forEach(p=>{
  div.innerHTML+=`<div class="prod">${p.produto} - ${p.data}</div>`;
 });
 tela("excluidos");
}

function voltar(){ tela("home"); }

</script>

</body>
</html>
